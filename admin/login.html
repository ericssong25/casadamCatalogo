<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar sesión — Casa Dam Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/admin.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/auth.js"></script>
</head>
<body>

<div class="login-page" x-data="{
  email: '',
  password: '',
  showPassword: false,
  errorMsg: '',
  loading: false,

  async init() {
    var session = await checkSession(false);
    if (session) window.location.href = 'panel.html';
    this.$nextTick(function () { if (window.lucide) lucide.createIcons(); });
  },

  async doLogin() {
    this.errorMsg = '';
    if (!this.email.trim()) { this.errorMsg = 'Ingresa tu email'; return; }
    if (!this.password) { this.errorMsg = 'Ingresa tu contraseña'; return; }

    this.loading = true;
    var result = await login(this.email.trim(), this.password);
    this.loading = false;

    if (result.error) {
      this.errorMsg = result.error.message || 'Email o contraseña incorrectos';
      return;
    }
    window.location.href = 'panel.html';
  }
}">

  <div class="login-card">
    <div class="login-logo">
      <img src="../assets/CasaDamLogo.png" alt="Casa Dam" style="max-height:45px;margin:0 auto 0.4rem;display:block;">
      <div class="login-logo__name">Casa Dam</div>
      <div class="login-logo__slogan">Vivimos contigo</div>
    </div>

    <h1 class="login-title">Panel Administrativo</h1>
    <p class="login-subtitle">Inicia sesión para continuar</p>

    <form @submit.prevent="doLogin()">
      <div class="form-error" x-show="errorMsg" x-text="errorMsg" role="alert"></div>

      <div class="form-group">
        <label for="email">Email</label>
        <div class="input-wrapper">
          <input id="email" type="email" x-model="email" placeholder="admin@casadam.com" autocomplete="email" :disabled="loading">
        </div>
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <div class="input-wrapper">
          <input id="password" :type="showPassword ? 'text' : 'password'" x-model="password" placeholder="••••••••" autocomplete="current-password" :disabled="loading">
          <button type="button" class="toggle-password" @click="showPassword = !showPassword" tabindex="-1">
            <i x-show="!showPassword" data-lucide="eye" style="width:18px;height:18px;color:var(--color-text-secondary);"></i>
            <i x-show="showPassword" data-lucide="eye-off" style="width:18px;height:18px;color:var(--color-text-secondary);"></i>
          </button>
        </div>
      </div>

      <button type="submit" class="btn btn-primary" :disabled="loading" style="width:100%;">
        <span class="spinner" x-show="loading"></span>
        <span x-text="loading ? 'Ingresando...' : 'Iniciar sesión'"></span>
      </button>
    </form>

    <div class="login-back">
      <a href="../index.html">&larr; Volver al catálogo</a>
    </div>
  </div>
</div>

<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js"></script>
</body>
</html>
